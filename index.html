<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Care Bears - CSS Grid</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="gallery" aria-label="Pictures Preferences">
    <section class="title box">
      <h1>Picture Preferences</h1>
    </section>

    <img class="box top-banner" src="imgGrid/topBannerSavior.jpg" alt="Savior">

    <img class="box item pink-box" src="imgGrid\imgPesas.jpg" alt="imagePesas">
    <img class="box item green-box" src="imgGrid\imgShoes.avif" alt="imageShoes">

    <img class="box main-poster" src="https://m.media-amazon.com/images/M/MV5BMTkxOTAzNDc5Nl5BMl5BanBnXkFtZTcwMDU2NjQyMQ@@._V1_.jpg" alt="Poster de Care Bears Adventures in Care-a-lot">

    <img class="box item yellow-box" src="imgGrid\imgInsp.jpg" alt="Inspiration Image">

    <img class="box rainbow-scene" src="imgGrid\imgMontainMex.jpg" alt="Mountain Mexico">

    <img class="box item blue-box" src="imgGrid\imgGymHome.jpg" alt="image Gym Home">
    <img class="box item blue-bear" src="imgGrid\imgGym.jpg" alt="image Gym">
    <img class="box item small-pink-box" src="imgGrid\imgGym2.jpg" alt="image Gym New">

    <img class="box love-banner" src="imgGrid\imgSierraNevada.jpg" alt="Sierra Nevada">
  </main>
</body>
</html>
