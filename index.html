<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Care Bears - CSS Grid</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="gallery" aria-label="Pictures Preferences">
    <section class="title box">
      <h1>Picture Preferences</h1>
    </section>

    <img class="box top-banner" src="imageGrid/mountainTop.jpg" alt="ImageMountain">

    <img class="box item pink-box" src="imageGrid\imgPesas.jpg" alt="imagePesas">
    <img class="box item green-box" src="imageGrid\imgShoes.avif" alt="imageShoes">

    <img class="box main-poster" src="imageGrid\gymHome3.jpg" alt="Gym at home">

    <img class="box item yellow-box" src="imageGrid\imgInsp.jpg" alt="Inspiration Image">

    <img class="box rainbow-scene" src="imageGrid\imgMontainMex.jpg" alt="Mountain Mexico">

    <img class="box item blue-box" src="imageGrid\imgGymHome.jpg" alt="image Gym Home">
    <img class="box item blue-bear" src="imageGrid\imgGym.jpg" alt="image Gym">
    <img class="box item small-pink-box" src="imageGrid\imgGym2.jpg" alt="image Gym New">

    <img class="box love-banner" src="imageGrid\imgSierraNevada.jpg" alt="Sierra Nevada">
  </main>
</body>
</html>
